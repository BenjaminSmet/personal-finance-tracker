<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Finance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100%;
      background: #020d18;
      color: #f0f4f8;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── CSS VARIABLES ─── */
    :root {
      --bg-base:           #020d18;
      --glass-bg:          rgba(8, 28, 52, 0.65);
      --glass-bg-card:     rgba(6, 22, 44, 0.72);
      --glass-border:      rgba(255, 255, 255, 0.10);
      --glass-border-sub:  rgba(255, 255, 255, 0.06);
      --text-primary:      #f0f4f8;
      --text-secondary:    rgba(240,244,248,0.60);
      --text-tertiary:     rgba(240,244,248,0.35);
      --tint-blue:         #007AFF;
      --tint-green:        #34C759;
      --tint-red:          #FF3B30;
      --tint-orange:       #FF9500;
      --tint-purple:       #AF52DE;
      --tint-yellow:       #FFCC00;
      --tint-teal:         #5AC8FA;
      --tab-h:             80px;
      --safe-bottom:       env(safe-area-inset-bottom, 0px);
    }

    /* ─── ANIMATED BACKGROUND ─── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,180,220,0.13) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: orb1 20s ease-in-out infinite;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,140,200,0.11) 0%, transparent 70%);
      bottom: 100px; right: -100px;
      animation: orb2 26s ease-in-out infinite;
    }
    @keyframes orb1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(60px,40px)} 66%{transform:translate(-30px,70px)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-50px,-30px)} 66%{transform:translate(40px,-60px)} }

    /* ─── AUTH SCREEN ─── */
    #auth-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #020d18;
    }
    .auth-card {
      background: rgba(8,28,52,0.80);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      max-width: 360px; width: 90%;
    }
    .auth-card .logo { font-size: 56px; margin-bottom: 20px; }
    .auth-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

    /* ─── APP SHELL ─── */
    #app { display: none; height: 100dvh; flex-direction: column; position: relative; z-index: 1; }
    #app.visible { display: flex; }

    /* ─── TOPBAR ─── */
    #topbar {
      display: flex; align-items: center;
      padding: 16px 20px 10px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      flex-shrink: 0; gap: 12px;
    }
    #page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; flex: 1; }
    #header-actions { display: flex; gap: 8px; align-items: center; }

    /* ─── SCROLL AREA ─── */
    #scroll-area {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 8px 16px calc(var(--tab-h) + var(--safe-bottom) + 20px);
      -webkit-overflow-scrolling: touch;
    }
    #scroll-area::-webkit-scrollbar { display: none; }

    /* ─── BOTTOM TAB BAR ─── */
    #tab-bar {
      position: fixed; bottom: calc(16px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%);
      width: 50%; min-width: 280px; max-width: 420px;
      background: rgba(0,20,38,0.80);
      backdrop-filter: blur(28px) saturate(1.9) brightness(1.1);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      display: flex; align-items: center;
      padding: 6px;
      z-index: 50;
    }
    .tab-pill {
      position: absolute;
      height: calc(100% - 12px);
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      transition: left 0.55s cubic-bezier(0.34,1.3,0.64,1), width 0.55s cubic-bezier(0.34,1.3,0.64,1);
      pointer-events: none;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 0; cursor: pointer; border-radius: 999px;
      transition: transform 0.2s cubic-bezier(0.34,1.3,0.64,1);
      position: relative; z-index: 1; gap: 2px;
    }
    .tab-item:hover  { transform: scale(1.07); }
    .tab-item:active { transform: scale(0.93); }
    .tab-icon  { font-size: 18px; line-height: 1; }
    .tab-label { font-size: 9px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.3px; transition: color 0.2s; }
    .tab-item.active .tab-label { color: var(--text-primary); }

    /* ─── CONTENT PAGE ─── */
    #content-area { animation: pagein 0.3s cubic-bezier(0.22,1,0.36,1); }
    @keyframes pagein { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── GLASS CARDS ─── */
    .glass-card {
      background: var(--glass-bg-card);
      backdrop-filter: blur(28px) saturate(1.9);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 0;
    }
    .glass-card-sm  { padding: 14px; border-radius: 16px; }
    .glass-card-xs  { padding: 10px 12px; border-radius: 12px; }
    .hero-card      { background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(94,92,230,0.15)); }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap;
    }
    .btn-primary {
      background: var(--tint-blue); color: #fff;
    }
    .btn-primary:hover  { background: #0a84ff; }
    .btn-primary:active { transform: scale(0.96); }
    .btn-glass {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-primary);
    }
    .btn-glass:hover  { background: rgba(255,255,255,0.16); }
    .btn-glass:active { transform: scale(0.96); }
    .btn-danger {
      background: rgba(255,59,48,0.18);
      border: 1px solid rgba(255,59,48,0.3);
      color: var(--tint-red);
    }
    .btn-danger:hover  { background: rgba(255,59,48,0.28); }

    /* ─── INPUTS ─── */
    .input, .select {
      width: 100%; padding: 11px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-primary); font-size: 14px; font-family: inherit;
      outline: none; transition: border 0.15s;
      -webkit-appearance: none; appearance: none;
    }
    .input:focus, .select:focus { border-color: var(--tint-blue); }
    .input::placeholder { color: var(--text-tertiary); }
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .input-group:last-child { margin-bottom: 0; }
    .input-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .amount-input-wrap { position: relative; }
    .amount-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 14px; pointer-events: none; }
    .amount-input-wrap .input { padding-left: 26px; }

    /* ─── BOTTOM SHEET MODAL ─── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadein 0.2s ease;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .modal-sheet {
      background: rgba(6,20,42,0.97);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 600px;
      max-height: 90dvh; overflow-y: auto;
      padding: 0 20px calc(24px + var(--safe-bottom));
      animation: slideup 0.35s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.18); margin: 12px auto 16px; }
    .modal-title  { font-size: 18px; font-weight: 700; margin-bottom: 18px; text-align: center; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

    /* ─── LAYOUT HELPERS ─── */
    .flex-row { display: flex; align-items: center; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .title-sm { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
    .text-secondary { color: var(--text-secondary); }
    .text-tertiary  { color: var(--text-tertiary); }
    .text-xs { font-size: 11px; }
    .text-sm { font-size: 12px; }

    /* ─── TX ROW ─── */
    .tx-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--glass-border-sub);
      transition: opacity 0.15s;
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-row:active { opacity: 0.7; }
    .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .tx-amount { font-size: 14px; font-weight: 700; flex-shrink: 0; }

    /* ─── PROGRESS ─── */
    .progress-track { height: 5px; border-radius: 100px; background: rgba(255,255,255,0.10); overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 100px; background: var(--tint-blue); transition: width 0.6s cubic-bezier(0.34,1.2,0.64,1); }

    /* ─── SEGMENT CONTROL ─── */
    .segment-control { display: flex; background: rgba(255,255,255,0.07); border-radius: 10px; padding: 3px; gap: 2px; }
    .segment-btn { flex: 1; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .segment-btn.active { background: rgba(255,255,255,0.15); color: var(--text-primary); }

    /* ─── LIST ROWS (More page) ─── */
    .list-section { background: var(--glass-bg-card); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; }
    .list-section-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); padding: 12px 16px 8px; }
    .list-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-top: 1px solid var(--glass-border-sub); transition: background 0.15s; }
    .list-row:first-of-type { border-top: none; }
    .list-row:active { background: rgba(255,255,255,0.05); }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-state p  { font-size: 13px; color: var(--text-secondary); }

    /* ─── TOAST ─── */
    #toast-container { position: fixed; top: calc(env(safe-area-inset-top,0px) + 16px); left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      background: rgba(20,40,65,0.95); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 10px 18px; font-size: 13px; font-weight: 600;
      white-space: nowrap; animation: toastin 0.3s cubic-bezier(0.34,1.3,0.64,1);
      backdrop-filter: blur(20px);
    }
    @keyframes toastin { from { opacity:0; transform:translateY(-10px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
    .toast.success { border-color: rgba(52,199,89,0.4); }
    .toast.warning { border-color: rgba(255,149,0,0.4); }
    .toast.error   { border-color: rgba(255,59,48,0.4); }

    /* ─── MOBILE ─── */
    @media (max-width: 400px) {
      #tab-bar { width: 90%; }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <script type="module" crossorigin src="/personal-finance-tracker/assets/index-ITFstjGM.js"></script>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="logo">💰</div>
      <h1>Finance</h1>
      <p>Your personal money tracker</p>
      <button class="btn btn-primary" id="google-signin-btn" style="width:100%;justify-content:center;font-size:15px;padding:14px">
        <span>🔐</span> Sign in with Google
      </button>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app">
    <div id="topbar">
      <div id="page-title">Overview</div>
      <div id="header-actions"></div>
    </div>

    <div id="scroll-area">
      <div id="content-area"></div>
    </div>

    <!-- TAB BAR -->
    <div id="tab-bar">
      <div class="tab-pill" id="tab-pill"></div>
      <div class="tab-item active" data-page="dashboard"    onclick="navigate('dashboard')">    <span class="tab-icon">📊</span><span class="tab-label">Overview</span></div>
      <div class="tab-item"        data-page="accounts"     onclick="navigate('accounts')">     <span class="tab-icon">💳</span><span class="tab-label">Accounts</span></div>
      <div class="tab-item"        data-page="transactions" onclick="navigate('transactions')"> <span class="tab-icon">↕️</span><span class="tab-label">Transactions</span></div>
      <div class="tab-item"        data-page="fixed-costs"  onclick="navigate('fixed-costs')"> <span class="tab-icon">🔄</span><span class="tab-label">Fixed</span></div>
      <div class="tab-item"        data-page="more"         onclick="navigate('more')">         <span class="tab-icon">⋯</span><span class="tab-label">More</span></div>
    </div>
  </div>

  <div id="toast-container"></div>

</body>
</html>
